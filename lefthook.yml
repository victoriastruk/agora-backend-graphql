colors: true
skip_output: [meta, success]

pre-commit:
  parallel: true
  commands:
    lint:
      glob: '**/*.{js,ts}'
      run: |
        echo "🔍 Linting backend code..."
        bun run lint {staged_files}
      skip: [merge, rebase]

    typecheck:
      glob: '**/*.ts'
      run: |
        echo "🔎 Type checking backend..."
        bun run type-check
      skip: [merge, rebase]

    no-debug:
      glob: '**/*.{js,ts}'
      run: |
        echo "🐛 Checking for debug code..."
        excluded_patterns="src/db/seeds/seed.ts|src/db/client.ts|src/db/redis.ts|src/index.ts|node_modules|\.md$|tests/"
        debug_found=false
        for file in {staged_files}; do
          if echo "$file" | grep -qE "$excluded_patterns"; then
            continue
          fi
          if git diff --cached "$file" 2>/dev/null | grep -E "^\+" | grep -E "(console\.log|debugger)" | grep -qvE "(^\+\s*//|^\+\s*\*|:.*//.*console\.log|:.*\*.*console\.log|process\.env\.NODE_ENV)"; then
            echo "⚠️ Debug code detected in $file!"
            git diff --cached "$file" | grep -E "^\+" | grep -E "(console\.log|debugger)" | grep -vE "(^\+\s*//|^\+\s*\*|:.*//.*console\.log|:.*\*.*console\.log|process\.env\.NODE_ENV)" || true
            debug_found=true
          fi
        done
        if [ "$debug_found" = true ]; then
          echo "❌ Please remove console.log or debugger statements before committing."
          exit 1
        fi
      skip: ['src/index.ts']

commit-msg:
  parallel: true
  commands:
    commitlint:
      run: |
        echo "📝 Validating commit message..."
        npx --no-install commitlint --edit "$1"

post-merge:
  commands:
    update-deps:
      run: |
        echo "📦 Checking dependencies..."
        if git diff --name-only ORIG_HEAD HEAD | grep -E 'bun\\.lock|package\\.json'; then
          echo "📦 Updating dependencies..."
          bun install
        fi

post-checkout:
  commands:
    setup:
      run: |
        echo "🧹 Preparing workspace..."
        if [ "$3" = "1" ] && git diff --name-only $1 $2 | grep -E 'bun\\.lock|package\\.json'; then
          echo "📦 Updating dependencies for new branch..."
          bun install
        fi
